                        <input type="text" id="categoryName" required>

                        <label for="description">Description:</label>
                        <input type="text" id="description" required>
                    </div>

                    <div class="form-buttons">

                        <button type="submit" class="submit-button">Add Category</button>
                    </div>
                </form>
            </div>
        </div>
