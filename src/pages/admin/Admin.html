<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>IMS - Admin Panel</title>

    <!-- ===== Defensive MediaSession patch (must run BEFORE any other scripts) ===== -->
    <script>
    (function () {
      try {
        // Safe-wrap setActionHandler so injected unsupported actions won't throw
        if ('mediaSession' in navigator && typeof navigator.mediaSession.setActionHandler === 'function') {
          const original = navigator.mediaSession.setActionHandler.bind(navigator.mediaSession);
          navigator.mediaSession.setActionHandler = function(action, handler) {
            try {
              original(action, handler);
            } catch (err) {
              console.warn('Ignored unsupported MediaSession action:', action);
            }
          };
        }
      } catch (e) {
        console.warn('MediaSession safe-wrap failed', e);
      }

      // Suppress the specific autoPip injected error to avoid aborting other scripts
      window.addEventListener('error', function (ev) {
        try {
          if (ev && ev.message && ev.message.indexOf('enterpictureinpicture') !== -1 && ev.message.indexOf('setActionHandler') !== -1) {
            ev.preventDefault();
            console.warn('Suppressed injected autoPip MediaSession error:', ev.message);
            return true;
          }
        } catch (e) {}
      }, true);
    })();
    </script>

    <!-- Styles (fixed relative paths) -->
    <link rel="stylesheet" href="../../styles/sidebar.css">
    <link rel="stylesheet" href="/Smart-Inventory/src/styles/content.css">
    <link rel="stylesheet" href="../../styles/logout-popup.css">
    <link rel="icon" type="image/png" href="../../assets/main_logo.png">

    <style>
        .admin-topbar {
            position: fixed;
            top: 0;
            left: 250px;
            right: 0;
            z-index: 80;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            min-height: auto;
            padding: 18px 28px 0;
            transition: left 0.25s ease;
            pointer-events: none;
        }
        .admin-identity {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border: 1px solid rgba(249, 115, 22, 0.16);
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(255,247,237,0.98) 100%);
            box-shadow: 0 8px 18px rgba(249, 115, 22, 0.08);
            pointer-events: auto;
        }
        .admin-avatar {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f97316;
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.02em;
            flex-shrink: 0;
        }
        .admin-identity-copy {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }
        .admin-identity-label {
            color: #9ca3af;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .admin-identity-name {
            color: #7c2d12;
            font-size: 15px;
            font-weight: 700;
        }
        #main-content {
            opacity: 0;
            transition: opacity 0.4s ease;
            padding-top: 88px;
        }
        #main-content.visible {
            opacity: 1;
        }
        .sidebar.collapsed ~ .admin-topbar {
            left: 88px;
        }
        .confirm-popup {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(15, 23, 42, 0.42);
            backdrop-filter: blur(4px);
            z-index: 1200;
        }
        .confirm-popup.active {
            display: flex;
        }
        .confirm-box {
            width: min(100%, 440px);
            background: #fff;
            border-radius: 22px;
            padding: 26px 24px 22px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.22);
        }
        .confirm-badge {
            width: 44px;
            height: 44px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #fff7ed;
            color: #c2410c;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 14px;
        }
        .confirm-box h3 {
            margin: 0 0 10px;
            color: #111827;
            font-size: 24px;
            line-height: 1.15;
        }
        .confirm-box p {
            margin: 0;
            color: #6b7280;
            font-size: 14px;
            line-height: 1.6;
        }
        .confirm-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 22px;
        }
        .confirm-buttons button {
            border: none;
            border-radius: 999px;
            min-height: 42px;
            padding: 0 18px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease, background-color 0.18s ease;
        }
        .confirm-buttons button:hover {
            transform: translateY(-1px);
        }
        .confirm-buttons button:active {
            transform: translateY(0);
            opacity: 0.94;
        }
        .confirm-cancel {
            background: #f3f4f6;
            color: #374151;
        }
        .confirm-delete {
            background: #f97316;
            color: #fff;
            box-shadow: 0 10px 24px rgba(249, 115, 22, 0.18);
        }
        .confirm-delete:hover {
            background: #ea580c;
        }
        @media (max-width: 900px) {
            .admin-topbar {
                left: 0;
                padding: 18px 18px 0 74px;
            }
        }
        @media (max-width: 560px) {
            .admin-topbar {
                justify-content: flex-start;
            }
            .admin-identity {
                width: 100%;
                border-radius: 18px;
            }
            .admin-identity-name {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar toggle -->
    <div class="sidebar-toggle" id="sidebarToggle">&#9776;</div>

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="#" onclick="openPage('dashboard','1_dashboard')">
            <img src="../../assets/dashboard.white.png"><span>Dashboard</span>
        </a>
        <a href="#" onclick="openPage('categories','2_categories')">
            <img src="../../assets/categories.white.png"><span>Categories</span>
        </a>
        <a href="#" onclick="openPage('products','3_products')">
            <img src="../../assets/white.png"><span>Products</span>
        </a>
        <a href="#" onclick="openPage('employees','4_employees')">
            <img src="../../assets/employee.white.png"><span>Employees</span>
        </a>
        <a href="#" onclick="openPage('transactions','5_transactions')">
            <img src="../../assets/transaction.white.png"><span>Transactions</span>
        </a>
        <a href="#" onclick="openPage('reports','6_reports')">
            <img src="../../assets/report.white.png"><span>Reports</span>
        </a>
        <a href="#" class="logout" onclick="showLogoutPopup()">
            <img src="../../assets/exit.white.png"><span>Logout</span>
        </a>
    </div>

    <div class="admin-topbar">
        <div class="admin-identity" aria-live="polite">
            <div class="admin-avatar" id="adminAvatar">A</div>
            <div class="admin-identity-copy">
                <span class="admin-identity-label">Logged In As</span>
                <span class="admin-identity-name" id="adminDisplayName">Admin</span>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="content" id="main-content"></div>

    <!-- Logout popup -->
    <div class="logout-popup" id="logoutPopup">
        <div class="logout-box">
            <h3>Are you sure you want to log out?</h3>
            <div class="logout-buttons">
                <button class="yes" onclick="confirmLogout()">Yes</button>
                <button class="no" onclick="closeLogoutPopup()">No</button>
            </div>
        </div>
    </div>

    <div class="confirm-popup" id="confirmPopup">
        <div class="confirm-box">
            <div class="confirm-badge">!</div>
            <h3 id="confirmTitle">Delete Item</h3>
            <p id="confirmMessage">Do you want to permanently delete this item?</p>
            <div class="confirm-buttons">
                <button type="button" class="confirm-cancel" id="confirmCancelBtn">Cancel</button>
                <button type="button" class="confirm-delete" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <!-- MAIN SCRIPT LOADER -->
    <script>
    (function(){
        try {
            if ('mediaSession' in navigator && typeof navigator.mediaSession.setActionHandler === 'function') {
            const orig = navigator.mediaSession.setActionHandler.bind(navigator.mediaSession);
            navigator.mediaSession.setActionHandler = function(action, handler) {
                try {
                orig(action, handler);
                } catch (err) {
                console.warn('Ignored unsupported MediaSession action:', action);
                }
            };
            }
        } catch(e) {
            console.warn('MediaSession patch failed', e);
        }
    })();

    function buildAdminInitials(name) {
        const parts = String(name || '')
            .trim()
            .split(/\s+/)
            .filter(Boolean)
            .slice(0, 2);
        if (!parts.length) return 'A';
        return parts.map(part => part.charAt(0).toUpperCase()).join('');
    }

    async function loadAdminIdentity() {
        try {
            const res = await fetch('get_admin_session.php?v=20260409-admin-session-1', {
                credentials: 'same-origin',
                cache: 'no-store'
            });
            if (!res.ok) return;
            const data = await res.json().catch(() => null);
            if (!data || !data.success) return;

            const displayName = String(data.display_name || '').trim() || String(data.username || '').trim() || 'Admin';
            const nameEl = document.getElementById('adminDisplayName');
            const avatarEl = document.getElementById('adminAvatar');
            if (nameEl) nameEl.textContent = displayName;
            if (avatarEl) avatarEl.textContent = buildAdminInitials(displayName);
        } catch (err) {
            console.warn('loadAdminIdentity failed', err);
        }
    }

    function saveLastPage(section, folder) {
        localStorage.setItem("lastSection", section);
        localStorage.setItem("lastFolder", folder);
    }

    let confirmPopupResolver = null;

    function closeStyledConfirm(result) {
        const popup = document.getElementById("confirmPopup");
        if (popup) popup.classList.remove("active");
        if (confirmPopupResolver) {
            const resolve = confirmPopupResolver;
            confirmPopupResolver = null;
            resolve(result);
        }
    }

    window.showDeleteConfirm = function(options = {}) {
        const popup = document.getElementById("confirmPopup");
        const title = document.getElementById("confirmTitle");
        const message = document.getElementById("confirmMessage");
        const confirmBtn = document.getElementById("confirmDeleteBtn");
        const cancelBtn = document.getElementById("confirmCancelBtn");

        if (!popup || !title || !message || !confirmBtn || !cancelBtn) {
            const fallbackMessage = options.message || 'Do you want to permanently delete this item?\n\nThis cannot be undone.';
            return Promise.resolve(window.confirm(fallbackMessage));
        }

        title.textContent = options.title || "Delete Item";
        message.textContent = options.message || "Do you want to permanently delete this item? This cannot be undone.";
        confirmBtn.textContent = options.confirmLabel || "Delete";
        cancelBtn.textContent = options.cancelLabel || "Cancel";
        popup.classList.add("active");

        return new Promise((resolve) => {
            confirmPopupResolver = resolve;
        });
    };

    function openPage(section, folder) {
        saveLastPage(section, folder);
        if (typeof window.setActiveLink === "function") {
            window.setActiveLink(section);
        }
        loadContent(section, folder);
    }

    function notifySidebarLoadFinished() {
        window.dispatchEvent(new CustomEvent("sidebar:loading:end"));
    }

    function decorateAdminReportStatusPills() {
        try {
            const rows = document.querySelectorAll("#reportTable tbody tr");
            rows.forEach((row) => {
                const statusCell = row.cells[4];
                if (!statusCell) return;
                const rawText = (statusCell.textContent || "").trim();
                if (!rawText) return;
                if (statusCell.querySelector("span")) return;

                let background = "#dcfce7";
                let color = "#166534";
                const key = rawText.toLowerCase();

                if (key === "unavailable") {
                    background = "#fee2e2";
                    color = "#b91c1c";
                } else if (key === "critical") {
                    background = "#fef2f2";
                    color = "#991b1b";
                } else if (key === "low") {
                    background = "#fff7ed";
                    color = "#c2410c";
                }

                statusCell.style.whiteSpace = "nowrap";
                statusCell.innerHTML = `<span style="display:inline-flex;align-items:center;justify-content:center;min-width:112px;padding:8px 14px;border-radius:999px;font-weight:700;font-size:13px;line-height:1.1;background:${background};color:${color};white-space:nowrap;">${rawText}</span>`;
            });
        } catch (err) {
            console.warn("decorateAdminReportStatusPills failed", err);
        }
    }

    function cleanupAdminReportsControls() {
        try {
            document.querySelectorAll('.filter-section').forEach((section) => {
                section.style.display = 'none';
            });
            document.querySelectorAll('#generateBtn, #startDate, #endDate').forEach((el) => {
                el.style.display = 'none';
                el.remove();
            });
            document.querySelectorAll('label[for="startDate"], label[for="endDate"]').forEach((label) => {
                label.style.display = 'none';
            });
            document.querySelectorAll('#generateBtn, #startDate, #endDate').forEach((el) => el.remove());
            document.querySelectorAll('#reportTable').forEach(() => {
                document.querySelectorAll('.filter-section').forEach((section) => section.remove());
                document.querySelectorAll('label[for="startDate"], label[for="endDate"]').forEach((label) => {
                    const wrapper = label.closest('div');
                    if (wrapper) wrapper.remove();
                    else label.remove();
                });
            });
        } catch (err) {
            console.warn("cleanupAdminReportsControls failed", err);
        }
    }

    function decorateAdminTransactionButtons() {
        try {
            document.querySelectorAll('#txBody .view-btn').forEach((btn) => {
                btn.style.border = 'none';
                btn.style.borderRadius = '999px';
                btn.style.padding = '8px 16px';
                btn.style.background = '#f97316';
                btn.style.color = '#fff';
                btn.style.fontWeight = '700';
                btn.style.fontSize = '13px';
                btn.style.cursor = 'pointer';
                btn.style.boxShadow = '0 8px 18px rgba(234,88,12,0.18)';
            });

            document.querySelectorAll('#txBody .remove-btn').forEach((btn) => {
                btn.style.border = 'none';
                btn.style.borderRadius = '999px';
                btn.style.padding = '8px 16px';
                btn.style.background = 'linear-gradient(135deg,#ef4444 0%,#dc2626 100%)';
                btn.style.color = '#fff';
                btn.style.fontWeight = '700';
                btn.style.fontSize = '13px';
                btn.style.cursor = 'pointer';
                btn.style.boxShadow = '0 8px 18px rgba(220,38,38,0.18)';
            });
        } catch (err) {
            console.warn("decorateAdminTransactionButtons failed", err);
        }
    }

    async function loadContent(section, folder) {
        const container = document.getElementById("main-content");
        const htmlVersion = '20260409-admin-html-26';
        if (typeof window.showSidebarLoading === "function") {
            window.showSidebarLoading();
        }
        container.classList.remove("visible");
        container.innerHTML = `<div class="content-section"><h2>Loading ${section}...</h2></div>`;

        // Remove old scripts
        document.querySelectorAll("script[data-section]").forEach(s => s.remove());

        // Try .html then .php (AD suffix preferred)
        async function tryFetch(sec, ext) {
            const res = await fetch(`${folder}/${sec}.${ext}?v=${htmlVersion}`, { cache: 'no-store' });
            if (!res.ok) throw new Error(`Not found: ${folder}/${sec}.${ext}`);
            return { html: await res.text(), usedSection: sec };
        }

        let result;

        try {
            try {
                result = await tryFetch(section + "_AD", "html");
            } catch {
                container.innerHTML = `<p>Error loading ${section}.</p>`;
                container.classList.add("visible");
                notifySidebarLoadFinished();
                return;
            }

            // Insert HTML/PHP output
            container.innerHTML = result.html;

            // =============================
            //  Fixed & safe script loader
            // =============================
(function loadSectionScript(folder, usedSection) {
    const scriptVersion = '20260409-admin-ui-26';

    // --- SPECIAL CASE: if we loaded the employees_AD HTML, force employees_AD.js ---
    // This is minimal and isolated â€” it won't affect other pages.
    if (usedSection === 'employees_AD') {
        const scriptPath = `${folder}/employees_AD.js?v=${scriptVersion}`;
        const js = document.createElement('script');
        js.src = scriptPath;
        js.setAttribute('data-section', usedSection);

        js.onload = () => {
            console.log(scriptPath + " Loaded (employees override) âœ”");
            requestAnimationFrame(() => {
                document.dispatchEvent(new CustomEvent("sectionLoaded", {
                    detail: { section: usedSection }
                }));
                if (usedSection.startsWith("dashboard")) {
                    document.dispatchEvent(new Event("dashboardLoaded"));
                }
                setTimeout(() => {
                    if (usedSection.startsWith("reports")) {
                        cleanupAdminReportsControls();
                        decorateAdminReportStatusPills();
                        setTimeout(cleanupAdminReportsControls, 150);
                        setTimeout(cleanupAdminReportsControls, 400);
                        setTimeout(decorateAdminReportStatusPills, 250);
                    }
                    if (usedSection.startsWith("transactions")) {
                        decorateAdminTransactionButtons();
                        setTimeout(decorateAdminTransactionButtons, 150);
                        setTimeout(decorateAdminTransactionButtons, 500);
                    }
                    container.classList.add("visible");
                    notifySidebarLoadFinished();
                }, 10);
            });
        };

        js.onerror = () => {
            console.error("Failed to load employees script:", scriptPath);
            container.innerHTML = `<p>Error loading script: ${scriptPath}</p>`;
            container.classList.add("visible");
            notifySidebarLoadFinished();
        };

        document.body.appendChild(js);
        return; // do not run candidate logic for employees (we forced correct script)
    }

    // --- ORIGINAL CANDIDATE LOGIC (preserved exactly) ---
    const candidates = [];
    candidates.push(`${folder}/${usedSection}.js?v=${scriptVersion}`);

    if (!usedSection.endsWith('_AD')) {
        candidates.push(`${folder}/${usedSection}_AD.js?v=${scriptVersion}`);
    } else {
        const base = usedSection.replace(/_AD$/, '');
        candidates.push(`${folder}/${base}.js?v=${scriptVersion}`);
    }

    let attempt = 0;

    function loadNext() {
        if (attempt >= candidates.length) {
            container.innerHTML = `<p>Error loading script. Tried:<br>${candidates.join("<br>")}</p>`;
            container.classList.add("visible");
            console.error("All script loads failed", candidates);
            notifySidebarLoadFinished();
            return;
        }

        const src = candidates[attempt++];
        const js = document.createElement("script");
        js.src = src;
        js.setAttribute("data-section", usedSection);

        js.onload = () => {
            console.log(src + " Loaded âœ”");

            requestAnimationFrame(() => {
                document.dispatchEvent(new CustomEvent("sectionLoaded", {
                    detail: { section: usedSection }
                }));

                if (usedSection.startsWith("dashboard")) {
                    document.dispatchEvent(new Event("dashboardLoaded"));
                }

                setTimeout(() => {
                    container.classList.add("visible");
                    notifySidebarLoadFinished();
                }, 10);
            });
        };

        js.onerror = () => {
            console.warn(src + " failed â€” trying next candidate...");
            js.remove();
            loadNext();
        };

        document.body.appendChild(js);
    }

    loadNext();

})(folder, result.usedSection);

        } catch (err) {
            container.innerHTML = `<p>Error loading section: ${err.message}</p>`;
            container.classList.add("visible");
            notifySidebarLoadFinished();
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadAdminIdentity();
        const lastSection = localStorage.getItem("lastSection");
        const lastFolder = localStorage.getItem("lastFolder");

        if (lastSection && lastFolder) {
            loadContent(lastSection, lastFolder);
        } else {
            loadContent("dashboard", "1_dashboard");
        }
    });

    function showLogoutPopup() {
        document.getElementById("logoutPopup").classList.add("active");
    }
    function closeLogoutPopup() {
        document.getElementById("logoutPopup").classList.remove("active");
    }
    function confirmLogout() {
        document.body.style.opacity = 0;
        setTimeout(() => {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = "../../login/Login.html";
        }, 500);
    }

    document.getElementById("confirmCancelBtn")?.addEventListener("click", () => closeStyledConfirm(false));
    document.getElementById("confirmDeleteBtn")?.addEventListener("click", () => closeStyledConfirm(true));
    document.getElementById("confirmPopup")?.addEventListener("click", (e) => {
        if (e.target && e.target.id === "confirmPopup") closeStyledConfirm(false);
    });
    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && confirmPopupResolver) closeStyledConfirm(false);
    });
    </script>

    <script src="../../scripts/sidebar.js"></script>
</body>
</html>
