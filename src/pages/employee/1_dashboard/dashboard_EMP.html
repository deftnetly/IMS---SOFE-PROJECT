<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .employee-dashboard-shell {
            padding: 28px;
        }
        .employee-dashboard {
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-width: 1580px;
            margin: 0 auto;
            padding: 10px 18px 18px;
        }
        .employee-dashboard h2 {
            margin: 0;
            color: #ff5b00;
        }
        .employee-dashboard .dashboard-cards {
            margin-top: 0;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        }
        .employee-dashboard .card {
            padding: 16px 20px;
            min-height: 104px;
        }
        .employee-dashboard .card h3 {
            font-size: 15px;
            margin-bottom: 10px;
        }
        .employee-dashboard .card p {
            font-size: 22px;
            line-height: 1.1;
        }
        .dashboard-panel {
            background: #fff;
            border-radius: 14px;
            padding: 14px 16px 10px;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
        }
        .dashboard-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .dashboard-panel-header h2 {
            font-size: 18px;
        }
        .low-stock-table-wrap {
            max-height: 360px;
            overflow: auto;
            border-radius: 12px;
        }
        .employee-dashboard .data-table {
            margin-top: 0;
        }
        .employee-dashboard .data-table th,
        .employee-dashboard .data-table td {
            padding: 10px 12px;
        }
        .employee-dashboard .data-table thead th {
            color: #111827;
            font-weight: 700;
        }
        .employee-dashboard .data-table tbody td {
            color: #6b7280;
        }
        .employee-dashboard .data-table tbody td:nth-child(1) {
            color: #0f766e;
            font-weight: 600;
        }
        .employee-dashboard .data-table tbody td:nth-child(2) {
            color: #7c2d12;
            font-weight: 700;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 92px;
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.01em;
        }
        .status-unavailable {
            background: #fee2e2;
            color: #b91c1c;
        }
        .status-critical {
            background: #fef2f2;
            color: #991b1b;
        }
        .status-low {
            background: #fff7ed;
            color: #c2410c;
        }
        .status-available {
            background: #dcfce7;
            color: #166534;
        }
        .dashboard-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }
        .dashboard-checkout-btn {
            background: #f97316;
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 12px 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.18);
            transition: transform 0.18s ease, background-color 0.18s ease, opacity 0.18s ease;
        }
        .dashboard-checkout-btn:hover {
            transform: translateY(-1px);
            background: #ea580c;
        }
        .dashboard-checkout-btn:active {
            transform: translateY(0);
            opacity: 0.94;
        }
    </style>
</head>
<body>
    <div class="employee-dashboard-shell">
    <div id="dashboard" class="content-section employee-dashboard">
        <h2>Dashboard</h2>

        <!-- Cards Section -->
        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Products Available</h3>
                <p id="totalProducts">0</p>
            </div>
            <div class="card">
                <h3>Low Stock Alerts</h3>
                <p id="lowStockCount">0</p>
            </div>
            <div class="card">
                <h3>Today's Sales</h3>
                <p id="todaysSales">&#8369;0.00</p>
            </div>
        </div>

        

        <!-- Low Stock Items Section -->
        <section class="dashboard-panel">
            <div class="dashboard-panel-header">
                <h2>Low Stock Items</h2>
            </div>
            <div class="low-stock-table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Product Name</th>
                            <th>Stock</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="lowStockList">
                        <tr>
                            <td colspan="4" style="text-align:center; color:gray;">Loading low stock items...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="dashboard-actions">
                <button class="dashboard-checkout-btn" id="checkoutBtn" onclick="window.goToCheckout && window.goToCheckout()">Go to Checkout</button>
            </div>
        </section>
    </div>
    </div>

    <!-- External JS -->
    <script src="dashboard_EMP.js"></script>
</body>
</html>
