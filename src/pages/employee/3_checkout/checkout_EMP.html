<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/smart-inventory/src/pages/employee/3_checkout/checkout_EMP.css?v=20260409-checkout-cart-4">
  <!-- local CSS in same folder -->
</head>
<body>
  <div class="checkout-container">

    <main class="checkout-main">
      <!-- LEFT: products + cart -->
      <section class="left-col">

        <!-- Product section (controls + scrollable grid) -->
        <div class="product-section">
          <header class="checkout-header">
            <h2 class="checkout-title">Checkout</h2>
          </header>
          <div class="product-section-header">
            <div class="product-top-row">
              <div class="filter-cluster">
                <div class="product-count"><span id="productCount">0</span> products</div>
                <select id="productCategoryFilter" aria-label="Filter category">
                  <option value="all">All categories</option>
                </select>
                <input id="productGridSearch" placeholder="Search products..." aria-label="Search products" />
              </div>
            </div>
          </div>

          <!-- fixed-height, scrollable product list -->
          <div class="product-list-container">
            <div id="productGrid" class="product-grid" aria-live="polite"></div>
          </div>
        </div>

        <!-- Cart area -->
        <div class="cart-box">
          <h3 class="cart-title">Cart</h3>
          <table class="data-table" id="cartTable">
            <thead>
              <tr>
                <th>Product ID</th>
                <th>Name</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <!-- RIGHT: Order summary -->
      <aside class="right-col">
        <div class="summary-card">
          <h4>Order Summary</h4>

          <div class="summary-row">
            <span>Subtotal:</span>
            <span id="orderSubtotal">&#8369;0.00</span>
          </div>

          <div class="summary-row">
            <span>Tax (12%):</span>
            <span id="orderTax">&#8369;0.00</span>
          </div>

          <div class="summary-row total">
            <strong>Total:</strong>
            <strong id="orderTotal">&#8369;0.00</strong>
          </div>

          <div class="summary-row small muted">
            <span>Transaction ID:</span>
            <span id="transactionId">-</span>
          </div>

          <button class="submit-button process" id="processBtn" onclick="processCheckout()">Process Checkout</button>
        </div>
      </aside>
    </main>

    <div class="checkout-notice" id="checkoutNotice">
      <div class="checkout-notice-card">
        <div class="checkout-notice-badge" id="checkoutNoticeBadge">i</div>
        <h3 id="checkoutNoticeTitle">Notice</h3>
        <p id="checkoutNoticeMessage">Message</p>
        <div class="checkout-notice-actions">
          <button type="button" class="checkout-notice-button" id="checkoutNoticeOk">OK</button>
        </div>
      </div>
    </div>

  </div>

  <!-- External JS file (no inline scripts in fragment) -->
  <script src="checkout_EMP.js?v=20260409-checkout-js-2"></script>
</body>
</html>
