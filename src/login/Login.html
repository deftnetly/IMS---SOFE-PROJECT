<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/login.css?v=20260409-login-ui-2">
    <link rel="icon" type="image/png" href="../assets/main_logo.png">
    <script src="../login/login.js?v=20260409-login-ui-2"></script>
    <title>Login</title>
</head>
<body>
    <div class="login-container">
        <img src="../assets/main_logo.png" alt="Inventory Logo" class="Login-logo">
        <hr class="divider">
        <h1>Login</h1>
        <form id="loginForm" autocomplete="off">
            <div class="input-group">
                <img class="login-icon" src="../assets/login-icon.png" alt="Login Icon">
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <img class="login-password" src="../assets/login-password.png" alt="Password Icon">
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Password"
                        required
                    >
                    <button type="button" id="togglePassword" class="password-toggle" aria-label="Show password"></button>
                </div>
            </div>
            <button type="submit" class="login-submit">Login</button>
        </form>
    </div>
</body>
</html>
